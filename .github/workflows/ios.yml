name: Build iOS IPA

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Enable iOS
        run: flutter config --enable-ios

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create Payload
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/

      - name: Make IPA
        run: zip -r MyStore.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyStore-IPA
          path: MyStore.ipa